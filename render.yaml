databases:
  - name: duckkine-db
    plan: free
    databaseName: duckkine
    user: duckkine

services:
  - type: web
    plan: free
    name: duckkine-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: duckkine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://duckkine.cl
